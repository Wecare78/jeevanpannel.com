<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Options - JEEVAN PANNEL</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="header-center">
        <span class="logo"></span>
        <span class="header-title">JEEVAN PANNEL<br><small>AUTHORIZED OFFICIAL JEEVAN PANNEL WEBSITE</small></span>
    </div>
</header>

<div class="card">
    <div class="title">WITHDRAWAL OPTIONS</div>

    <div class="info-box">
        <p><i class="fas fa-info-circle"></i> ALL TRANSACTIONS ARE CURRENTLY COLLECTED IN PORTAL</p>
        <p>AFTER WITHDRAWL PROCESS AS SINGLE TRANSACTION AND CREDITED TO YOUR BANK ACCOUNT</p>
    </div>

    <div class="withdrawal-option">
        <button class="withdrawal-btn" id="impsBtn">
            <i class="fas fa-bolt"></i>
            <strong>IMPS / ONSPOT WITHDRAW</strong>
            <small>TAKES LESS THAN A MINUTE</small>
        </button>
    </div>

    <div class="withdrawal-option">
        <button class="withdrawal-btn" id="neftBtn">
            <i class="fas fa-clock"></i>
            <strong>NEFT</strong>
            <small>TAKES 3-5 WORKING DAYS</small>
        </button>
    </div>

    <button class="btn btn-back" onclick="window.history.back();">BACK</button>
</div>

<div class="footer">
    <div class="footer-item" data-page="profile"><i class="fas fa-user"></i> MY PROFILE</div>
    <div class="footer-item" data-page="account"><i class="fas fa-wallet"></i> MY ACCOUNT</div>
    <div class="footer-item" data-page="support"><i class="fas fa-headset"></i> CUSTOMER SUPPORT</div>
    <div class="footer-item" data-page="bonus"><i class="fas fa-gift"></i> BONUS</div>
</div>

<script src="js/main.js"></script>
</body>
</html>
