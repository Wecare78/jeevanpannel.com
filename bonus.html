<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus Page - JEEVAN PANNEL</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="header-center">
        <span class="logo"></span>
        <span class="header-title">JEEVAN PANNEL<br><small>AUTHORIZED OFFICIAL JEEVAN PANNEL WEBSITE</small></span>
    </div>
</header>

<div class="card bonus-card" style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
    <div style="text-align: center; padding: 40px 20px;">
        <div style="font-size: 48px; margin-bottom: 20px;">
            <i class="fas fa-hourglass-half" style="color: #FF9800;"></i>
        </div>
        
        <div style="font-size: 28px; font-weight: bold; color: #FF9800; margin-bottom: 15px;">
            ⚠️ Sorry bonus is not temporarily available
        </div>
        
        <div style="font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 10px;">
            <i class="fas fa-clock" style="color: #2196F3;"></i>
            <span>⏳ Please check after sometime</span>
        </div>
    </div>
</div>

<div class="footer">
    <div class="footer-item" data-page="profile"><i class="fas fa-user"></i> MY PROFILE</div>
    <div class="footer-item" data-page="account"><i class="fas fa-wallet"></i> MY ACCOUNT</div>
    <div class="footer-item" data-page="support"><i class="fas fa-headset"></i> CUSTOMER SUPPORT</div>
    <div class="footer-item" data-page="bonus"><i class="fas fa-gift"></i> BONUS</div>
</div>

<script src="js/main.js"></script>

</body>
</html>
